<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#251a13">
    <title>Wachtwoord resetten | Slinnva Professionals</title>
    <link rel="stylesheet" href="agenda.css">
  </head>
  <body>
    <header class="agenda-header">
      <a class="brand" href="agenda-beheer.html">
        <span>SP</span>
        <strong>Slinnva Agenda Beheer</strong>
      </a>
    </header>

    <main>
      <section class="admin-section">
        <div class="section-head">
          <p class="eyebrow">Beheer</p>
          <h1>Nieuw wachtwoord instellen</h1>
        </div>

        <form class="panel login-panel" id="resetForm">
          <h3>Wachtwoord wijzigen</h3>
          <label>Nieuw wachtwoord<input name="password" type="password" autocomplete="new-password" required minlength="8"></label>
          <label>Herhaal wachtwoord<input name="passwordConfirm" type="password" autocomplete="new-password" required minlength="8"></label>
          <button class="button primary" type="submit">Wachtwoord opslaan</button>
          <p class="status" id="resetStatus"></p>
        </form>
      </section>
    </main>

    <script src="agenda.js"></script>
  </body>
</html>
